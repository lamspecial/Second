<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آي أم سبيشل | دراسة حالة</title>
<meta name="description" content="آي أم سبيشل - دراسة حالة">

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-800 relative min-h-screen flex flex-col">

<div class="bg-blob-1"></div>
<div class="bg-blob-2"></div>
<div class="bg-blob-3"></div>

<!-- Loading overlay -->
<div id="loadingOverlay">
    <div id="loadingSpinner" class="w-12 h-12 border-4 border-slate-300 border-t-slate-800 rounded-full animate-spin mb-4"></div>
    <p class="text-slate-700 font-bold">I am Special...</p>
</div>

<!-- ===== HEADER ===== -->
<header class="glass-header text-white px-4 py-4 sticky top-0 z-40">
    <div class="max-w-3xl mx-auto flex justify-center items-center">
        <h1 id="logoClick" class="text-xl sm:text-2xl font-black tracking-wide flex items-center gap-1.5 whitespace-nowrap drop-shadow-md cursor-pointer select-none">
            <span class="text-red-600">أي</span>
            <span class="text-red-600">آم</span>
            <span class="text-yellow-400">سبيشل</span>
        </h1>
    </div>
</header>

<!-- ===== MAIN — المقال الوحيد ===== -->
<div id="mainApp" class="p-4 md:p-8 max-w-3xl mx-auto w-full flex-grow">

    <article class="glass-panel rounded-2xl p-6 md:p-8 mb-6 border border-white/40">
        <span class="badge badge-indigo mb-3 inline-block">دراسة حالة</span>
        <h2 id="articleTitle" class="text-2xl md:text-3xl font-black text-slate-900 mb-4 leading-snug"></h2>
        <div id="articleBody" class="text-slate-700 leading-loose text-justify whitespace-pre-wrap font-medium text-base"></div>
    </article>

    <!-- الردود -->
    <section class="glass-panel rounded-2xl p-6 border border-white/40">
        <h3 class="text-lg font-black text-slate-900 mb-4">مناقشة الحالة</h3>
        <div id="repliesList" class="space-y-6"></div>

        <div class="mt-6 pt-4 border-t border-white/30" id="mainReplyActions">
            <button onclick="startManagerFlow()" class="w-full btn-outline btn-outline-indigo py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                شاركي رأيك
            </button>
        </div>
        <div id="managerFlowContainer" class="mt-4"></div>
    </section>
</div>

<!-- ===== نافذة الرقم السري ===== -->
<div id="pinModal" class="fixed inset-0 bg-slate-900/55 backdrop-blur-md z-[200] hidden items-center justify-center p-4">
    <div class="glass-panel rounded-2xl p-7 shadow-2xl max-w-xs w-full text-center border border-white/50">
        <h2 class="text-lg font-black text-slate-900 mb-4">الرقم السري</h2>
        <input type="password" id="pinInput" inputmode="numeric" maxlength="6"
            class="w-full p-3 rounded-lg glass-input text-center text-xl tracking-widest mb-4" placeholder="••••">
        <p id="pinError" class="text-rose-600 text-xs font-bold mb-3 hidden">رقم غير صحيح</p>
        <div class="flex gap-2">
            <button onclick="checkPin()" class="flex-1 btn-solid-dark py-2.5 rounded-xl text-sm">دخول</button>
            <button onclick="closePinModal()" class="btn-outline btn-outline-slate px-4 py-2.5 rounded-xl text-sm">إلغاء</button>
        </div>
    </div>
</div>

<!-- ===== نافذة تعديل المقال (للمشرف) ===== -->
<div id="adminModal" class="fixed inset-0 bg-slate-900/45 backdrop-blur-md z-[150] hidden items-center justify-center p-4">
    <div class="glass-panel rounded-2xl w-full max-w-2xl max-h-[92vh] overflow-y-auto shadow-2xl border border-white/60">
        <div class="p-5 border-b border-white/30 bg-white/30 rounded-t-2xl sticky top-0 flex justify-between items-center z-10">
            <h2 class="text-lg font-black text-slate-900">تعديل دراسة الحالة</h2>
            <button onclick="closeAdminModal()" class="text-slate-600 hover:text-slate-900 w-8 h-8 rounded-full bg-white/50 hover:bg-white flex items-center justify-center transition border border-white/60">✕</button>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">عنوان المقال</label>
                <input type="text" id="adminTitleInput" class="w-full p-3 rounded-lg glass-input text-sm">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">محتوى المقال</label>
                <textarea id="adminBodyInput" rows="8" class="w-full p-4 rounded-xl glass-input text-sm leading-relaxed resize-y"></textarea>
            </div>
            <button onclick="saveArticleAdmin()" class="w-full btn-solid-dark py-3 rounded-xl font-black">حفظ المقال</button>
        </div>
        <div class="p-6 pt-0 border-t border-white/30 mt-2">
            <h3 class="text-base font-black text-slate-900 mt-4 mb-3">الرد على ردود مديرات الفروع</h3>
            <div id="adminRepliesList" class="space-y-4"></div>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="copyToast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-800/90 border border-white/20 text-white font-bold px-6 py-3 rounded-xl shadow-2xl z-[300] hidden text-sm"></div>

<script src="app.js"></script>
</body>
</html>
