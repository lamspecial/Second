<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اي ام سبيشل للضيافة الترفيهية - حماية السمعة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <!-- شعار اي ام سبيشل - النقر 7 مرات يفتح نافذة الدخول السرية -->
        <div class="logo-container">
            <img id="iam-special-logo" src="logo.png" alt="شعار اي ام سبيشل" title="انقر 7 مرات للدخول">
        </div>
        <h1>نظام حماية السمعة</h1>
    </header>

    <main>
        <!-- صفحة المقال الافتراضية بعد تنظيفها من كافة الأزرار غير الضرورية -->
        <article class="article-container">
            <h2>عنوان المقال التوجيهي</h2>
            <p class="article-content">هذا النص يمثل محتوى المقال الإداري الداخلي لنظام حماية السمعة الخاص بـ اي ام سبيشل للضيافة الترفيهية...</p>
            
            <!-- تم الإبقاء على أزرار التفاعل مع المقال فقط والتخلص من البقية -->
            <div class="article-interactions">
                <button class="btn-interact" id="btn-like">👍 إعجاب</button>
                <button class="btn-comment" id="btn-comment">💬 تعليق</button>
                <button class="btn-share" id="btn-share">🔗 مشاركة</button>
            </div>
        </article>

        <!-- قسم استعراض التعليقات والردود -->
        <section class="comments-section">
            <h3>التعليقات والردود الإدارية</h3>
            <div id="comments-container">
                <!-- يتم بناؤه ديناميكياً عبر الجافا سكريبت -->
            </div>
        </section>
    </main>

    <!-- نافذة الدخول السرية - تم حذف آلية الإيموجي والرقم واستبدالها بنموذج دخول مباشر ومحمي -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2>تسجيل دخول الإدارة</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">اسم المستخدم:</label>
                    <input type="text" id="username" autocomplete="off" required>
                </div>
                <div class="form-group">
                    <label for="password">كلمة المرور الإدارية:</label>
                    <input type="password" id="password" required>
                </div>
                <!-- تحديث العبارة القياسية إلى طلب اتصال -->
                <button type="submit" class="btn-submit">طلب اتصال</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
